<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NECKLACES — Созвездия зачарованного леса</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Plus+Jakarta+Sans:wght@300;400&display=swap');

:root {
    --forest-dark: #0a1410;
    --forest-deep: #050a08;
    --text-light: #f4f0e3;
    --text-muted: #b8b09a;
    --accent-gold: #d4af37;
    --accent-gold-bright: #f4d03f;
    --accent-mystic: #8b6fd4;
    --font-serif: 'Cinzel', serif;
    --font-display: 'Cormorant Garamond', serif;
    --font-sans: 'Plus Jakarta Sans', sans-serif;
    --cb-transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
    background-color: var(--forest-dark);
    color: var(--text-light);
    font-family: var(--font-sans);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    cursor: none;
}

/* === КАСТОМНЫЙ КУРСОР === */
.cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(244, 208, 63, 0.9) 0%, rgba(212, 175, 55, 0.4) 50%, transparent 70%);
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease;
    mix-blend-mode: screen;
}
.cursor-trail {
    position: fixed;
    width: 40px;
    height: 40px;
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99998;
    transform: translate(-50%, -50%);
    transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
}

/* === ФОН (БЕЗ ЗАТЕМНЕНИЯ) === */
.nature-hero-bg {
    position: fixed;
    inset: 0;
    z-index: 1;
    overflow: hidden;
}
.bg-image {
    position: absolute;
    top: 50%; left: 50%;
    min-width: 100%; min-height: 100%;
    width: auto; height: auto;
    transform: translate(-50%, -50%);
    object-fit: cover;
    filter: saturate(1.1);
}

/* === НАВИГАЦИЯ === */
header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 30px 6%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    background: linear-gradient(to bottom, rgba(10, 20, 16, 0.6), transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
}
.logo {
    font-family: var(--font-serif);
    font-size: 22px;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--text-light);
    position: relative;
    padding: 0 10px;
}
.logo::before, .logo::after {
    content: '✦';
    color: var(--accent-gold);
    font-size: 10px;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.7;
}
.logo::before { left: -15px; }
.logo::after { right: -15px; }

nav { display: flex; gap: 40px; }
nav a {
    font-family: var(--font-serif);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--text-light);
    opacity: 0.7;
    transition: var(--cb-transition);
    position: relative;
}
nav a::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    width: 0;
    height: 1px;
    background: var(--accent-gold);
    transition: all 0.4s ease;
    transform: translateX(-50%);
}
nav a:hover { opacity: 1; color: var(--accent-gold); }
nav a:hover::after { width: 100%; }

/* === HERO: ТЕКСТ СЛЕВА, ОРБИТЫ СПРАВА === */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 120px 8% 60px;
    position: relative;
    z-index: 10;
    gap: 60px;
}

.hero-content-left {
    flex: 1;
    max-width: 650px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.hero-subtitle {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 16px;
    letter-spacing: 6px;
    color: var(--accent-gold);
    text-transform: uppercase;
    margin-bottom: 25px;
    opacity: 0.9;
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
}

.hero-title {
    font-family: var(--font-serif);
    font-size: clamp(2.5rem, 5.5vw, 4.8rem);
    line-height: 1.05;
    font-weight: 400;
    text-shadow: 0 10px 40px rgba(0,0,0,0.6);
    letter-spacing: 2px;
    margin-bottom: 25px;
}
.hero-title .accent {
    color: var(--accent-gold);
    font-style: italic;
    font-family: var(--font-display);
    font-weight: 300;
    display: block;
    font-size: 1.15em;
    margin: 8px 0;
    text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
}

.hero-divider-left {
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, var(--accent-gold), transparent);
    margin-bottom: 30px;
    position: relative;
}
.hero-divider-left::before {
    content: '❖';
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    color: var(--accent-gold);
    background: var(--forest-dark);
    padding-right: 12px;
    font-size: 14px;
}

.hero-description {
    font-family: var(--font-display);
    font-size: clamp(16px, 1.5vw, 20px);
    line-height: 1.8;
    color: var(--text-light);
    font-style: italic;
    font-weight: 300;
    max-width: 520px;
    text-shadow: 0 2px 15px rgba(0,0,0,0.5);
    opacity: 0.95;
}

.hero-description .gold {
    color: var(--accent-gold);
    font-weight: 400;
}

/* Магический круг справа */
.magic-circle {
    position: relative;
    width: min(500px, 45vw);
    height: min(500px, 45vw);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.orbit {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(212, 175, 55, 0.25);
}
.orbit-1 {
    width: 100%; height: 100%;
    animation: rotate 40s linear infinite;
    border-style: dashed;
}
.orbit-2 {
    width: 75%; height: 75%;
    animation: rotate 30s linear infinite reverse;
    border-color: rgba(212, 175, 55, 0.35);
}
.orbit-3 {
    width: 50%; height: 50%;
    animation: rotate 20s linear infinite;
    border-color: rgba(212, 175, 55, 0.45);
}

.orbit::before {
    content: '✦';
    position: absolute;
    top: -6px; left: 50%;
    transform: translateX(-50%);
    color: var(--accent-gold);
    font-size: 14px;
    text-shadow: 0 0 12px rgba(212, 175, 55, 0.9);
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* === МАНИФЕСТ === */
.manifesto {
    position: relative;
    z-index: 10;
    padding: 150px 8%;
    text-align: center;
    max-width: 900px;
    margin: 0 auto;
}

.manifesto-label {
    font-family: var(--font-serif);
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent-gold);
    margin-bottom: 40px;
    opacity: 0.8;
}

.manifesto-text {
    font-family: var(--font-display);
    font-size: clamp(24px, 3vw, 36px);
    line-height: 1.6;
    font-weight: 300;
    color: var(--text-light);
    font-style: italic;
}
.manifesto-text .gold {
    color: var(--accent-gold);
    font-weight: 400;
}
.manifesto-text .dropcap {
    font-family: var(--font-serif);
    font-size: 3em;
    float: left;
    line-height: 0.9;
    margin: 10px 15px 0 0;
    color: var(--accent-gold);
    font-style: normal;
    text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
}

/* === ГАЛЕРЕЯ АРТЕФАКТОВ === */
.artifacts {
    position: relative;
    z-index: 10;
    padding: 100px 5% 200px;
}

.artifacts-header {
    text-align: center;
    margin-bottom: 120px;
}
.artifacts-label {
    font-family: var(--font-serif);
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent-gold);
    margin-bottom: 20px;
}
.artifacts-title {
    font-family: var(--font-serif);
    font-size: clamp(2rem, 4vw, 3.5rem);
    font-weight: 400;
    letter-spacing: 3px;
}

.artifact {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    margin-bottom: 200px;
    max-width: 1400px;
    margin-left: auto;
    margin-right: auto;
    opacity: 0;
    transform: translateY(60px);
    transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
}
.artifact.visible {
    opacity: 1;
    transform: translateY(0);
}
.artifact:nth-child(even) .artifact-visual { order: 2; }
.artifact:nth-child(even) .artifact-info { order: 1; text-align: right; }
.artifact:nth-child(even) .artifact-meta::before { display: none; }
.artifact:nth-child(even) .artifact-meta::after {
    content: '';
    display: inline-block;
    width: 40px;
    height: 1px;
    background: var(--accent-gold);
    vertical-align: middle;
    margin-left: 15px;
}

/* Визуал с медальоном */
.artifact-visual {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 80px;
}

.medallion {
    position: relative;
    width: min(580px, 95%);
    aspect-ratio: 1/1;
}

.medallion-glow {
    position: absolute;
    inset: -25%;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.35) 0%, transparent 60%);
    filter: blur(50px);
    animation: breathe 4s ease-in-out infinite;
    z-index: 0;
}
@keyframes breathe {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.85; transform: scale(1.1); }
}

.medallion-rings {
    position: absolute;
    inset: 0;
    z-index: 1;
}
.medallion-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(212, 175, 55, 0.4);
}
.medallion-ring:nth-child(1) {
    inset: -20px;
    animation: rotate 25s linear infinite;
    border-style: dashed;
    border-color: rgba(212, 175, 55, 0.5);
}
.medallion-ring:nth-child(2) {
    inset: -45px;
    animation: rotate 35s linear infinite reverse;
    border-color: rgba(212, 175, 55, 0.25);
}
.medallion-ring::before {
    content: '✦';
    position: absolute;
    top: -8px; left: 50%;
    transform: translateX(-50%);
    color: var(--accent-gold);
    font-size: 16px;
    text-shadow: 0 0 15px rgba(212, 175, 55, 1);
}

/* === РАМКА С ДРАГОЦЕННЫМИ КАМНЯМИ === */
.medallion-image {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    z-index: 2;
    box-shadow: 
        0 0 0 4px rgba(212, 175, 55, 0.8),
        0 0 0 12px rgba(10, 20, 16, 0.9),
        0 0 0 13px rgba(212, 175, 55, 0.4),
        0 40px 100px rgba(0, 0, 0, 0.8),
        inset 0 0 80px rgba(0, 0, 0, 0.3);
    transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
}
.medallion-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 1.4s cubic-bezier(0.19, 1, 0.22, 1), filter 1s ease;
    filter: saturate(0.9) contrast(1.05) brightness(0.95);
}
.medallion:hover .medallion-image {
    transform: scale(1.05);
}
.medallion:hover .medallion-image img {
    transform: scale(1.15);
    filter: saturate(1.2) contrast(1.1) brightness(1);
}

/* Драгоценные камни по кругу */
.gems-ring {
    position: absolute;
    inset: -10px;
    z-index: 3;
    pointer
